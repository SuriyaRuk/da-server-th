name: Build & publish da-server image

# Publishes a PUBLIC multi-arch image to GitHub Container Registry:
#   ghcr.io/<owner>/da-server
# Make the package public once: GitHub repo > Packages > da-server >
# Package settings > Change visibility > Public.

on:
  push:
    branches: [develop, main]
    tags: ["v*"]
    paths:
      - "op-alt-da/**"
      - "go.mod"
      - "go.sum"
      - "Dockerfile"
      - ".github/workflows/docker-publish.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/da-server

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute build metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'develop') }}

      - name: Git date for version stamp
        id: gitdate
        run: echo "date=$(git show -s --format=%ct)" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_type == 'tag' && github.ref_name || format('dev-{0}', github.sha) }}
            GIT_COMMIT=${{ github.sha }}
            GIT_DATE=${{ steps.gitdate.outputs.date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
